<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaphor UI Assets Preview</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .item {
            background: #2a2a2a;
            border: 1px solid #444;
            padding: 15px;
            text-align: center;
            border-radius: 8px;
        }
        .preview {
            background: #333;
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        .label {
            font-size: 14px;
            color: #ccc;
        }
    </style>
</head>
<body>
    <h1>Metaphor UI Assets Preview</h1>
    <div class="grid">
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/button-primary.svg" alt="button-primary"></div>
            <div class="label">button-primary.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/button-secondary.svg" alt="button-secondary"></div>
            <div class="label">button-secondary.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/panel-bg.svg" alt="panel-bg"></div>
            <div class="label">panel-bg.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/sidebar-bg.svg" alt="sidebar-bg"></div>
            <div class="label">sidebar-bg.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/splatter-deco-1.svg" alt="splatter-deco-1"></div>
            <div class="label">splatter-deco-1.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/splatter-deco-2.svg" alt="splatter-deco-2"></div>
            <div class="label">splatter-deco-2.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/splatter-deco-3.svg" alt="splatter-deco-3"></div>
            <div class="label">splatter-deco-3.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/tag-bg.svg" alt="tag-bg"></div>
            <div class="label">tag-bg.svg</div>
        </div>
        <div class="item">
            <div class="preview"><img src="clean_repo/frontend/src/assets/metaphor-ui/title-underline.svg" alt="title-underline"></div>
            <div class="label">title-underline.svg</div>
        </div>
    </div>
</body>
</html>
