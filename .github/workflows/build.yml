name: Build Windows App

on:
  push:
    branches: [ "fix/4-issues-integration", "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r backend/requirements.txt
          
      - name: Build Python Backend
        run: python scripts/build_backend.py

      - name: Build React Frontend
        env:
          CI: false
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          pnpm install --no-frozen-lockfile --config.strict-peer-dependencies=false
          pnpm run build
        working-directory: ./frontend
          
      - name: Install Dependencies
        run: |
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force }
          pnpm install --no-frozen-lockfile --config.strict-peer-dependencies=false
      - name: Build Windows App
        env:
          CI: false
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          pnpm run build:electron
          pnpm run copy:frontend
          pnpm run build:builder
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SecondBrainAI-Windows-Exe
          path: dist/*.exe
