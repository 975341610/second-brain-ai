services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: second-brain-backend
    volumes:
      - ./data:/app/data
      - ./backend/assets:/app/assets
    environment:
      - DATABASE_URL=sqlite:///app/data/second_brain.db
      - CHROMA_DB_PATH=/app/data/chroma_store
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: second-brain-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
